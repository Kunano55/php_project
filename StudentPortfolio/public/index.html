<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Student Portfolio</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <site-header></site-header>

  <main class="container">
    <section class="hero">
      <h1>คลังผลงานนักศึกษา</h1>
      <p>ค้นหาและดูผลงานได้จากหน้านี้</p>
    </section>

    <section class="filters card">
      <div class="row gap">
        <input id="q" class="input" placeholder="ค้นหาชื่อผลงาน/คำอธิบาย" />
        <select id="category" class="input"></select>
        <button id="btnSearch" class="btn" type="button">ค้นหา</button>
      </div>
    </section>

    <section>
      <div id="grid" class="grid"></div>
      <p id="empty" class="muted" style="display:none;">ไม่พบผลงาน</p>
    </section>
  </main>

  <footer class="footer">
    <div class="container muted">Student Portfolio</div>
  </footer>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/header.js"></script>
  <script src="assets/js/index.js"></script>
</body>
</html>
