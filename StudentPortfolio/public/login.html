<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>เข้าสู่ระบบ</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container row">
      <a class="brand" href="index.html">Student Portfolio</a>
      <nav class="nav">
        <a href="index.html">ผลงาน</a>
        <a href="profile.html">โปรไฟล์</a>
        <a href="admin.html">แอดมิน</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>เข้าสู่ระบบ</h1>

    <section class="card" style="max-width:560px; margin:14px auto;">
      <p class="muted" style="margin-top:0;">
        ล็อกอินเพื่อเข้า <b>Admin Panel</b> (ใช้ session/cookie)
      </p>

      <label class="muted">อีเมล</label>
      <input id="email" class="input" placeholder="เช่น admin@demo.com" autocomplete="username" />

      <div style="height:10px"></div>

      <label class="muted">รหัสผ่าน</label>
      <input id="password" type="password" class="input" placeholder="รหัสผ่าน" autocomplete="current-password" />

      <div class="row gap" style="justify-content:flex-start; margin-top:12px;">
        <button id="btnLogin" class="btn">ล็อกอิน</button>
        <button id="btnLogout" class="btn" style="background:#fff; color:#111;">ออกจากระบบ</button>
        <span id="msg" class="muted"></span>
      </div>

      <div style="margin-top:12px" class="muted">
        <div>ทดสอบ: <b>admin@demo.com</b> / <b>123456</b> (ถ้าคุณสร้างไว้ใน DB)</div>
      </div>
    </section>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
