<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Panel</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <site-header></site-header>

  <main class="container">
    <h1>หน้าจัดการแอดมิน</h1>

    <section class="card">
      <h3>สรุปผลงานทั้งหมด</h3>
      <div id="summary" class="row gap wrap"></div>
    </section>

    <section class="card">
      <h3>จัดการหมวดหมู่</h3>
      <div class="row gap">
        <input id="catName" class="input" placeholder="ชื่อหมวดหมู่" />
        <button id="addCat" class="btn" type="button">เพิ่มหมวด</button>
      </div>
      <div id="catList" class="list"></div>
    </section>

    <div id="catModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; flex-direction:column;">
      <div class="card" style="max-width:600px; width:90%; background:#fff;">
        <h3 style="margin-top:0;">แก้ไขหมวดหมู่</h3>
        <input id="catEditName" class="input" placeholder="ชื่อหมวดหมู่" />
        <div class="row gap" style="justify-content:flex-start; margin-top:12px;">
          <button id="catSaveBtn" class="btn" type="button">บันทึก</button>
          <button id="catCloseBtn" class="btn" type="button" style="background:#fff;color:#111;">ปิด</button>
        </div>
      </div>
    </div>

    <section class="card">
      <h3>จัดการข้อมูลนักศึกษา</h3>
      <div id="studentList" class="list"></div>
    </section>

    <div id="studentModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; flex-direction:column;">
      <div class="card" style="max-width:700px; width:90%; background:#fff; max-height:85vh; overflow-y:auto;">
        <h3 style="margin-top:0;">ข้อมูลนักศึกษา</h3>
        <div id="studentModalContent"></div>
        <div class="row gap" style="justify-content:flex-start; margin-top:12px;">
          <button id="stuSaveBtn" class="btn" type="button">บันทึก</button>
          <button id="stuCloseBtn" class="btn" type="button" style="background:#fff;color:#111;">ปิด</button>
        </div>
      </div>
    </div>

    <section class="card">
      <h3>ตรวจสอบ/ซ่อนผลงาน</h3>
      <div id="workList" class="list"></div>
    </section>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/header.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
