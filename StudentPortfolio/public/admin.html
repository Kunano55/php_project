<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container row">
      <a class="brand" href="index.html">Student Portfolio</a>
      <nav class="nav">
        <a href="index.html">ผลงาน</a>
        <a href="profile.html">โปรไฟล์</a>
        <a href="login.html">ล็อกอิน</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>Admin Panel</h1>

    <section class="card">
      <h3>สรุปผลงานทั้งหมด</h3>
      <div id="summary" class="row gap wrap"></div>
    </section>

    <section class="card">
      <h3>จัดการหมวดหมู่</h3>
      <div class="row gap">
        <input id="catName" class="input" placeholder="ชื่อหมวดหมู่" />
        <button id="addCat" class="btn">เพิ่มหมวด</button>
      </div>
      <div id="catList" class="list"></div>
    </section>

    <section class="card">
      <h3>ตรวจ/ซ่อนผลงานที่ไม่เหมาะสม</h3>
      <div id="workList" class="list"></div>
    </section>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
