<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>หน้าสำหรับนักศึกษา</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <site-header></site-header>

  <main class="container">
    <h1>หน้าจัดการของนักศึกษา</h1>

    <section class="card">
      <div class="row gap">
        <p class="muted" id="studentInfo" style="margin:0;"></p>
        <button id="openCreateBtn" class="btn" type="button">+ เพิ่มผลงาน</button>
      </div>
    </section>

    <section id="createSection" class="card">
      <h3>เพิ่มผลงานใหม่</h3>
      <div class="row gap">
        <input id="titleIn" class="input" placeholder="ชื่อผลงาน" />
        <select id="categoryIn" class="input"></select>
      </div>
      <textarea id="descIn" class="input" rows="4" placeholder="รายละเอียดผลงาน"></textarea>
      <div class="row gap">
        <input id="workUrlIn" class="input" placeholder="ลิงก์ผลงาน (ถ้ามี)" />
      </div>
      <div class="row gap" style="display:none;">
        <input id="coverUrlIn" class="input" placeholder="ลิงก์รูปปก หรืออัปโหลดด้านล่าง" />
      </div>
      <div class="row gap">
        <input id="coverFileIn" type="file" class="input" accept="image/png,image/jpeg,image/webp" />
        <button id="clearCoverBtn" class="btn" type="button" style="background:#999;">ลบรูปที่เลือก</button>
      </div>
      <div class="row gap" style="justify-content:flex-start;">
        <button id="createBtn" class="btn" type="button">เพิ่มผลงาน</button>
        <span id="createMsg" class="muted"></span>
      </div>
    </section>

    <section class="card">
      <h3>ผลงานของฉัน</h3>
      <div id="myWorks" class="list"></div>
      <p id="myWorksEmpty" class="muted" style="display:none;">ยังไม่มีผลงาน</p>
    </section>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/header.js"></script>
  <script src="assets/js/student.js"></script>
</body>
</html>
