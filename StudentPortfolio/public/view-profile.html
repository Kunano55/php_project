<!doctype html>
<html lang="th">
<head>

  <title>โปรไฟล์นักศึกษา</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <main class="container">
    <a class="muted" href="index.html">← กลับ</a>

    <section class="card row gap">
      <img id="avatar" class="avatar" alt="profile" />
      <div style="flex:1">
        <h2 id="name">-</h2>
        <p id="bio" class="muted">-</p>

      </div>

    <section class="card">

      <div id="works" class="grid"></div>
      <p id="emptyWorks" class="muted" style="display:none;">ยังไม่มีผลงาน</p>

  <script src="assets/js/api.js"></script>
