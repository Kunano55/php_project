<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>แก้ไขผลงาน</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <site-header></site-header>

  <main class="container">
    <a class="muted" href="student.html">← กลับ</a>

    <section class="card">
      <h1>แก้ไขผลงาน</h1>

      <div class="row gap">
        <input id="titleIn" class="input" placeholder="ชื่อผลงาน" />
        <select id="categoryIn" class="input"></select>
      </div>

      <textarea id="descIn" class="input" rows="4" placeholder="รายละเอียดผลงาน"></textarea>

      <div class="row gap">
        <input id="workUrlIn" class="input" placeholder="ลิงก์ผลงาน (ถ้ามี)" />
      </div>

      <div style="margin:12px 0;">
        <label class="muted">รูปปก</label>
        <img id="coverPreview" alt="cover" style="max-width:300px; max-height:200px; margin:8px 0; border-radius:8px;" />
      </div>

      <div class="row gap">
        <input id="coverFileIn" type="file" class="input" accept="image/png,image/jpeg,image/webp" />
        <button id="clearCoverBtn" class="btn" type="button" style="background:#999;">ลบรูปที่เลือก</button>
      </div>

      <div class="row gap" style="justify-content:flex-start; margin-top:16px;">
        <button id="saveBtn" class="btn" type="button">บันทึกการแก้ไข</button>
        <button id="deleteBtn" class="btn" type="button" style="background:#dc3545;">ลบผลงาน</button>
        <span id="msg" class="muted"></span>
      </div>
    </section>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/header.js"></script>
  <script src="assets/js/edit-work.js"></script>
</body>
</html>
