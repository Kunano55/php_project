<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>โปรไฟล์นักศึกษา</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <site-header></site-header>

  <main class="container">
    <h1>โปรไฟล์นักศึกษา</h1>

    <section class="card row gap">
      <img id="avatar" class="avatar" alt="profile" />
      <div style="flex:1">
        <h2 id="name">-</h2>
        <p id="bio" class="muted">-</p>
        <div class="row gap">
          <span class="pill" id="major">-</span>
          <span class="pill" id="year">-</span>
        </div>
      </div>
    </section>

    <section class="card">
      <h3>แก้ไขโปรไฟล์</h3>
      <div class="row gap">
        <input id="nameIn" class="input" placeholder="ชื่อ" />
        <input id="majorIn" class="input" placeholder="สาขา" />
        <input id="yearIn" class="input" placeholder="ชั้นปี" />
      </div>
      <textarea id="bioIn" class="input" rows="4" placeholder="แนะนำตัว / ทักษะ"></textarea>
      <input id="avatarIn" class="input" placeholder="ลิงก์รูปโปรไฟล์" />
      <div class="row gap">
        <input id="avatarFileIn" type="file" class="input" accept="image/png,image/jpeg,image/webp" />
        <button id="uploadAvatarBtn" class="btn" type="button">อัปโหลดรูปโปรไฟล์</button>
      </div>
      <div class="row gap" style="justify-content:flex-start;">
        <button id="save" class="btn" type="button">บันทึก</button>
        <span id="msg" class="muted"></span>
      </div>
    </section>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/header.js"></script>
  <script src="assets/js/profile.js"></script>
</body>
</html>
